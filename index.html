<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Abroad Support for International Students | UniDoxia</title>
    <meta name="description" content="UniDoxia helps international students discover courses and universities, prepare stronger applications, and understand visa and scholarship requirements.">
    <meta name="author" content="UniDoxia" />
    <link rel="canonical" href="https://www.unidoxia.com/" />
    <meta name="theme-color" content="#1a365d" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0e1a2b" media="(prefers-color-scheme: dark)">

    <!-- Performance: DNS Prefetch for external services -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">

    <!-- Performance: Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="/videos/hero-poster.jpg" type="image/jpeg" fetchpriority="high">
    <link rel="preload" as="video" href="/videos/hero-video.mp4" type="video/mp4" fetchpriority="high">

    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="alternate" type="application/rss+xml" title="UniDoxia Blog" href="https://www.unidoxia.com/feed.xml" />

    <meta property="og:site_name" content="UniDoxia" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.unidoxia.com/" />
    <meta property="og:image" content="https://www.unidoxia.com/favicon.png">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.unidoxia.com/favicon.png">
    <meta property="og:title" content="Study Abroad Support for International Students | UniDoxia">
    <meta name="twitter:title" content="Study Abroad Support for International Students | UniDoxia">
    <meta property="og:description" content="UniDoxia helps international students discover courses and universities, prepare stronger applications, and understand visa and scholarship requirements.">
    <meta name="twitter:description" content="UniDoxia helps international students discover courses and universities, prepare stronger applications, and understand visa and scholarship requirements.">

    
    <!-- Performance: Early video prefetch for instant hero video -->
    <script>
      // Start video fetch immediately, before React hydrates
      (function() {
        if (typeof window === 'undefined') return;
        var prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        var saveData = conn && conn.saveData;
        var slowConnection = conn && ['slow-2g', '2g'].indexOf(conn.effectiveType) !== -1;
        if (prefersReducedMotion || saveData || slowConnection) return;
        // Create video element early to start buffering
        var video = document.createElement('video');
        video.preload = 'auto';
        video.muted = true;
        video.src = '/videos/hero-video.mp4';
        // Fetch the poster image
        var img = new Image();
        img.src = '/videos/hero-poster.jpg';
      })();
    </script>

    <!-- Performance: Inline critical CSS for first paint -->
    <style>
      /* Minimal critical CSS for initial render */
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;tab-size:4}
      body{margin:0;font-family:system-ui,-apple-system,sans-serif;line-height:1.5}
      #root{min-height:100vh}
      /* Loading spinner CSS */
      .min-h-screen{min-height:100vh}
      .flex{display:flex}
      .items-center{align-items:center}
      .justify-center{justify-content:center}
      .flex-col{flex-direction:column}
      .gap-4{gap:1rem}
      .h-10{height:2.5rem}
      .w-10{width:2.5rem}
      .rounded-full{border-radius:9999px}
      .border-4{border-width:4px}
      .animate-spin{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .text-sm{font-size:0.875rem}
      /* Theme-aware colors */
      :root{--bg:255 255 255;--fg:15 23 42;--primary:59 130 246}
      @media(prefers-color-scheme:dark){:root{--bg:15 23 42;--fg:248 250 252;--primary:96 165 250}}
      .bg-background{background-color:rgb(var(--bg))}
      .text-muted-foreground{color:rgb(var(--fg)/0.6)}
      .border-primary\/20{border-color:rgb(var(--primary)/0.2)}
      .border-t-primary{border-top-color:rgb(var(--primary))}
    </style>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
